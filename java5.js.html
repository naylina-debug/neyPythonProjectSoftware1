<!DOCTYPE html>
<html lang="en">
<head>
    <title>Leap Year</title>
</head>
<body>

<script>
    let year = Number(prompt("Enter a year:"));

    let result;

    if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
      result = year + " is a leap year.";
    } else {
      result = year + " is not a leap year.";
    }

    document.write(result);
</script>

</body>
</html>
