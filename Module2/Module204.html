<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sort Numbers</title>
</head>
<body>

<h2>Check the console for output</h2>

<script>
    let numbers = [];

    while (true) {
        let input = prompt("Enter a number (0 to stop):");

        let num = Number(input);

        if (num === 0) {
            break;
        }

        if (isNaN(num)) {
            alert("Please enter a valid number!");
            continue;
        }

        numbers.push(num);
    }

    numbers.sort(function(a, b) {
        return b - a;
    });

    console.log("Numbers from largest to smallest:");
    console.log(numbers);
</script>

</body>
</html>
