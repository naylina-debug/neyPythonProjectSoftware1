<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reverse Numbers</title>
</head>
<body>

<h2>Check the console for output</h2>

<script>
    let numbers = [];

    for (let i = 0; i < 5; i++) {
        let input = prompt("Enter number " + (i + 1) + ":");
        numbers.push(Number(input));
    }

    console.log("Numbers in reverse order:");

    for (let i = numbers.length - 1; i >= 0; i--) {
        console.log(numbers[i]);
    }
</script>

</body>
</html>
